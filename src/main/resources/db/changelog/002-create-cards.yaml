databaseChangeLog:
  - changeSet:
      id: 002-create-cards
      author: bank-api
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_number
                  type: text
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: balance
                  type: numeric(19,2)
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: user_cards
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: integer
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: user_cards
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_user