databaseChangeLog:
  - changeSet:
      id: 004-create-transactions
      author: bank-api
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true

              - column:
                  name: from_card_id
                  type: uuid

              - column:
                  name: to_card_id
                  type: uuid

              - column:
                  name: amount
                  type: numeric(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: varchar(50)

              - column:
                  name: status
                  type: varchar(50)

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tx_user
